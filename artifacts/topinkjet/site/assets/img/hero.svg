<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" role="img" aria-label="TopInkjet office printer">
    <defs>
      <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ECF2FF"/>
        <stop offset="50%" stop-color="#E3DFFD"/>
        <stop offset="100%" stop-color="#FFF4D2"/>
      </linearGradient>
      <radialGradient id="glow" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <filter id="hsh" x="-10%" y="-10%" width="120%" height="130%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
      </filter>
    </defs>
    <rect width="600" height="480" rx="32" fill="url(#hbg)"/>
    <rect width="600" height="480" rx="32" fill="url(#glow)"/>
