<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Epson EcoTank ET-2850">
    <defs>
      <linearGradient id="bg-ti-009" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ECF2FF"/>
        <stop offset="100%" stop-color="#ffffff"/>
      </linearGradient>
      <linearGradient id="body-ti-009" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#e5e7eb"/>
      </linearGradient>
      <linearGradient id="acc-ti-009" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#ef4444"/>
        <stop offset="100%" stop-color="#ef4444cc"/>
      </linearGradient>
      <filter id="sh-ti-009" x="-10%" y="-10%" width="120%" height="130%">
        <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
      </filter>
    </defs>
    <rect width="800" height="600" fill="url(#bg-ti-009)"/>
    <g filter="url(#sh-ti-009)">
      <!-- printer scanner top -->
      <rect x="200" y="160" width="400" height="60" rx="10" fill="#1f2937"/>
      <rect x="220" y="170" width="360" height="36" rx="6" fill="#374151"/>
      <!-- printer body -->
      <rect x="180" y="220" width="440" height="220" rx="14" fill="url(#body-ti-009)" stroke="#111827" stroke-width="2"/>
      <!-- accent stripe -->
      <rect x="180" y="220" width="440" height="14" rx="14" fill="url(#acc-ti-009)"/>
      <!-- screen -->
      <rect x="220" y="252" width="120" height="60" rx="6" fill="#0f172a"/>
      <rect x="232" y="266" width="96" height="6" rx="2" fill="#ef4444"/>
      <rect x="232" y="280" width="64" height="4" rx="2" fill="#94a3b8"/>
      <rect x="232" y="290" width="80" height="4" rx="2" fill="#64748b"/>
      <!-- buttons -->
      <circle cx="380" cy="282" r="8" fill="#cbd5e1"/>
      <circle cx="408" cy="282" r="8" fill="#cbd5e1"/>
      <circle cx="436" cy="282" r="8" fill="#ef4444"/>
      <!-- output tray -->
      <path d="M180 360 L620 360 L600 410 L200 410 Z" fill="#f3f4f6" stroke="#111827" stroke-width="2"/>
      <!-- paper -->
      <rect x="280" y="320" width="240" height="60" rx="3" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <rect x="300" y="335" width="180" height="4" rx="2" fill="#cbd5e1"/>
      <rect x="300" y="345" width="160" height="4" rx="2" fill="#e5e7eb"/>
      <rect x="300" y="355" width="200" height="4" rx="2" fill="#e5e7eb"/>
      <rect x="300" y="365" width="120" height="4" rx="2" fill="#e5e7eb"/>
      <!-- feet -->
      <rect x="200" y="438" width="40" height="10" rx="3" fill="#111827"/>
      <rect x="560" y="438" width="40" height="10" rx="3" fill="#111827"/>
      <!-- brand label -->
      <text x="400" y="478" font-family="Inter,Segoe UI,Helvetica,Arial,sans-serif" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">Epson</text>
    </g>
  </svg>