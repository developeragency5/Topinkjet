name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ImageMagick (used by topinkjet build-site.mjs)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build topinkjet static site
        run: node artifacts/topinkjet/build-site.mjs

      - name: Upload topinkjet site artifact
        uses: actions/upload-artifact@v4
        with:
          name: topinkjet-site
          path: artifacts/topinkjet/site
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://topinkjet.com

    steps:
      - name: Download topinkjet site artifact
        uses: actions/download-artifact@v4
        with:
          name: topinkjet-site
          path: site

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          PROJECT_NAME=topinkjet
          STATUS=$(curl -s -o /tmp/cf_check.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT_NAME")
          if [ "$STATUS" = "200" ]; then
            echo "Project '$PROJECT_NAME' already exists."
          else
            echo "Project '$PROJECT_NAME' not found (HTTP $STATUS). Creating..."
            curl -fsS -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"$PROJECT_NAME\",\"production_branch\":\"main\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
              | tee /tmp/cf_create.json
            echo "Project '$PROJECT_NAME' created."
          fi

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=topinkjet --branch=main --commit-dirty=true
